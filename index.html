<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edexcel A Economics Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #13110f;
  --ink2: #1e1b17;
  --parchment: #f2ede3;
  --cream: #e8e2d4;
  --gold: #c8973a;
  --gold2: #e0b870;
  --teal: #2a7268;
  --teal2: #3aa898;
  --ruby: #8b2635;
  --muted: #6b6050;
  --border: rgba(200,151,58,0.22);
  --border2: rgba(200,151,58,0.10);
  --purple: #9b8fd0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--ink);
  color:var(--parchment);
  font-family:'Crimson Pro',Georgia,serif;
  font-size:16px;
  line-height:1.7;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(200,151,58,0.018) 60px,rgba(200,151,58,0.018) 61px),
    repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(200,151,58,0.012) 60px,rgba(200,151,58,0.012) 61px);
  pointer-events:none;z-index:0;
}

/* ── SHELL ── */
.shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* ── HEADER ── */
.hdr{
display:flex;align-items:center;justify-content:space-between;
padding:10px 20px;
border-bottom:1px solid var(–border);
flex-shrink:0;
background:rgba(19,17,15,0.95);
}
.hdr-left{display:flex;align-items:baseline;gap:14px;}
.hdr-title{font-family:‘Playfair Display’,serif;font-size:1.25rem;font-weight:600;color:var(–gold2);}
.hdr-sub{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(–muted);}
.hdr-badges{display:flex;gap:6px;}
.bdg{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid;}
.bdg-t{border-color:rgba(58,168,152,0.4);color:var(–teal2);}
.bdg-g{border-color:var(–border);color:var(–gold);}
.bdg-r{border-color:rgba(155,143,208,0.4);color:var(–purple);}

/* ── BODY LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
width:220px;flex-shrink:0;
border-right:1px solid var(–border2);
overflow-y:auto;padding:12px 0;
}
.sidebar::-webkit-scrollbar{width:2px;}
.sidebar::-webkit-scrollbar-thumb{background:var(–border);border-radius:1px;}
.sb-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(–muted);padding:0 14px 6px;margin-bottom:2px;}
.nav-item{
display:flex;align-items:flex-start;gap:8px;
padding:8px 14px;cursor:pointer;
border-left:2px solid transparent;
transition:all 0.12s;
}
.nav-item:hover{background:rgba(200,151,58,0.04);}
.nav-item.active{border-left-color:var(–gold);background:rgba(200,151,58,0.07);}
.nav-item.active .nav-title{color:var(–gold2);}
.nav-dot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.dot-micro{background:var(–teal2);}
.dot-macro{background:var(–purple);}
.dot-syn{background:var(–gold);}
.nav-txt{flex:1;min-width:0;}
.nav-wk{font-family:‘DM Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:0.08em;text-transform:uppercase;}
.nav-title{font-size:12px;color:var(–parchment);line-height:1.3;margin-top:1px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(–border2);flex-shrink:0;padding:0 20px;}
.tab{
font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
padding:8px 14px;cursor:pointer;color:var(–muted);
border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.12s;
}
.tab:hover{color:var(–parchment);}
.tab.active{color:var(–gold2);border-bottom-color:var(–gold);}

/* ── PANEL ── */
.panel{flex:1;overflow-y:auto;padding:18px 20px;}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:var(–border2);border-radius:1px;}

/* ── WEEK HEADER ── */
.wk-hdr{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(–border2);}
.wk-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.wk-tag{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;}
.tag-micro{background:rgba(42,114,104,0.18);color:var(–teal2);border:1px solid rgba(58,168,152,0.25);}
.tag-macro{background:rgba(155,143,208,0.12);color:var(–purple);border:1px solid rgba(155,143,208,0.25);}
.tag-syn{background:rgba(200,151,58,0.12);color:var(–gold2);border:1px solid var(–border);}
.wk-num{font-family:‘DM Mono’,monospace;font-size:9px;color:var(–muted);letter-spacing:0.1em;text-transform:uppercase;}
.wk-title{font-family:‘Playfair Display’,serif;font-size:1.5rem;font-weight:600;color:var(–parchment);line-height:1.2;margin-bottom:4px;}
.wk-focus{color:var(–muted);font-style:italic;font-size:14px;}
.prog{height:2px;background:var(–border2);border-radius:1px;margin-top:10px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(–teal2),var(–gold));border-radius:1px;transition:width 0.4s;}

/* ── TOPIC CARDS ── */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tc{border:1px solid var(–border2);border-radius:3px;padding:12px 14px;background:rgba(255,255,255,0.015);transition:border-color 0.12s;}
.tc:hover{border-color:var(–border);}
.tc-title{font-size:13px;color:var(–gold2);margin-bottom:5px;font-family:‘Playfair Display’,serif;}
.tc-body{font-size:13px;color:var(–muted);line-height:1.5;}

/* ── QUICK PROMPTS ── */
.qp-wrap{margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap;}
.qp-btn{
font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;
padding:5px 10px;border-radius:2px;border:1px solid var(–border);
background:transparent;color:var(–muted);cursor:pointer;transition:all 0.12s;
}
.qp-btn:hover{border-color:var(–gold);color:var(–gold2);background:rgba(200,151,58,0.05);}

/* ── FORMULA ── */
.sec-lbl{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(–muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(–border2);}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
.fc{background:rgba(42,114,104,0.07);border:1px solid rgba(58,168,152,0.18);border-radius:3px;padding:10px 12px;}
.fc-name{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–teal2);margin-bottom:4px;letter-spacing:0.04em;}
.fc-expr{font-family:‘DM Mono’,monospace;font-size:14px;color:var(–parchment);font-weight:500;}
.fc-note{font-size:12px;color:var(–muted);margin-top:3px;font-style:italic;}

/* ── WORKED EXAMPLES ── */
.ex-box{border:1px solid var(–border);border-radius:3px;background:rgba(200,151,58,0.03);margin-bottom:10px;overflow:hidden;}
.ex-hdr{background:rgba(200,151,58,0.07);padding:9px 14px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;gap:10px;}
.ex-lbl{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.08em;color:var(–gold);text-transform:uppercase;margin-bottom:3px;}
.ex-q{font-size:13px;color:var(–parchment);line-height:1.4;}
.ex-toggle{color:var(–gold);font-size:12px;flex-shrink:0;margin-top:2px;transition:transform 0.15s;}
.ex-body{padding:14px;display:none;}
.ex-body.open{display:block;}
.step{display:flex;gap:10px;margin-bottom:10px;}
.step-n{width:20px;height:20px;border-radius:50%;background:var(–teal);color:#fff;font-family:‘DM Mono’,monospace;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-c{flex:1;font-size:13px;color:var(–cream);line-height:1.55;}
.step-c code{font-family:‘DM Mono’,monospace;background:rgba(58,168,152,0.12);color:var(–teal2);padding:1px 5px;border-radius:2px;font-size:12px;}
.ans-box{background:rgba(42,114,104,0.1);border:1px solid rgba(58,168,152,0.22);border-radius:2px;padding:9px 12px;margin-top:8px;font-family:‘DM Mono’,monospace;font-size:12px;color:var(–teal2);}

/* ── DIAGRAMS ── */
.dg{border:1px solid var(–border2);border-radius:3px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,0.012);}
.dg-title{font-family:‘Playfair Display’,serif;font-size:14px;color:var(–gold2);margin-bottom:8px;}
.dg-steps{list-style:none;counter-reset:sc;}
.dg-steps li{font-size:13px;color:var(–cream);padding:3px 0 3px 18px;position:relative;line-height:1.45;counter-increment:sc;}
.dg-steps li::before{content:counter(sc);position:absolute;left:0;font-family:‘DM Mono’,monospace;font-size:9px;color:var(–gold);top:6px;}

/* ── QUIZ ── */
.q-score{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–gold);margin-bottom:10px;letter-spacing:0.06em;}
.q-card{border:1px solid var(–border2);border-radius:3px;padding:14px;background:rgba(255,255,255,0.012);margin-bottom:10px;}
.q-q{font-size:14px;color:var(–parchment);margin-bottom:10px;line-height:1.5;}
.q-opts{display:flex;flex-direction:column;gap:6px;}
.q-opt{padding:8px 12px;border-radius:2px;border:1px solid var(–border2);background:transparent;color:var(–cream);font-size:13px;cursor:pointer;text-align:left;transition:all 0.1s;font-family:‘Crimson Pro’,serif;line-height:1.4;}
.q-opt:hover:not(:disabled){border-color:var(–gold);background:rgba(200,151,58,0.04);}
.q-opt.correct{background:rgba(42,114,104,0.18);border-color:var(–teal2);color:var(–teal2);}
.q-opt.wrong{background:rgba(139,38,53,0.12);border-color:#c05060;color:#d07080;}
.q-exp{font-size:12px;color:var(–muted);margin-top:8px;font-style:italic;line-height:1.5;display:none;}
.q-exp.show{display:block;}
.action-btn{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:7px 14px;border-radius:2px;border:1px solid var(–border);background:transparent;color:var(–muted);cursor:pointer;transition:all 0.12s;}
.action-btn:hover{border-color:var(–gold2);color:var(–gold2);}
.action-btn.submit{border-color:rgba(58,168,152,0.5);color:var(–teal2);background:rgba(42,114,104,0.08);}
.action-btn.submit:hover{background:rgba(42,114,104,0.15);}

/* ── AI TUTOR ── */
.tutor-wrap{display:flex;flex-direction:column;height:100%;}
.tutor-top{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0;}
.tutor-top::-webkit-scrollbar{width:2px;}
.tutor-top::-webkit-scrollbar-thumb{background:var(–border2);border-radius:1px;}
.empty-state{color:var(–muted);font-size:13px;text-align:center;padding:3rem 1rem;font-style:italic;margin:auto;}
.msg{max-width:88%;font-size:13px;line-height:1.6;}
.msg-user{align-self:flex-end;background:rgba(42,114,104,0.18);border:1px solid rgba(58,168,152,0.22);border-radius:3px 3px 0 3px;padding:8px 11px;color:var(–cream);}
.msg-ai{align-self:flex-start;background:rgba(200,151,58,0.06);border:1px solid var(–border2);border-radius:3px 3px 3px 0;padding:9px 13px;color:var(–parchment);}
.msg-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;color:var(–muted);}
.typing{display:flex;gap:3px;align-items:center;padding:3px 0;}
.typing span{width:4px;height:4px;border-radius:50%;background:var(–gold);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.tutor-bottom{flex-shrink:0;border-top:1px solid var(–border2);}
.tutor-qps{display:flex;gap:5px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(–border2);}
.tutor-inp-row{display:flex;}
.tutor-inp{flex:1;background:transparent;border:none;outline:none;padding:10px 14px;font-family:‘Crimson Pro’,serif;font-size:14px;color:var(–parchment);resize:none;max-height:80px;}
.tutor-inp::placeholder{color:var(–muted);}
.tutor-send{padding:10px 14px;background:transparent;border:none;border-left:1px solid var(–border2);cursor:pointer;font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(–muted);transition:all 0.12s;white-space:nowrap;}
.tutor-send:hover:not(:disabled){color:var(–gold2);background:rgba(200,151,58,0.05);}
.tutor-send:disabled{opacity:0.35;cursor:not-allowed;}

/* ── MSG CONTENT STYLES ── */
.msg-ai strong{color:var(–gold2);font-weight:500;}
.msg-ai code{font-family:‘DM Mono’,monospace;background:rgba(58,168,152,0.12);color:var(–teal2);padding:1px 5px;border-radius:2px;font-size:11px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.panel{animation:fadeUp 0.2s ease;}
</style>

</head>

<script>
const WEEKS = [
  {
    id:0, week:"Week 1", type:"micro", title:"Supply & Demand Analytics",
    focus:"Price mechanism, elasticity calculations and tax incidence",
    topics:[
      {title:"Price Elasticity of Demand",body:"Measures responsiveness of Qd to price change. PED > 1 = elastic (luxury goods), PED < 1 = inelastic (necessities). Negative by convention."},
      {title:"Price Elasticity of Supply",body:"Responsiveness of Qs to price. Higher with more time (SR vs LR), spare capacity, easily stored goods, and non-specific factors of production."},
      {title:"Cross & Income Elasticity",body:"XED: demand response to another good's price (+ve = substitutes, −ve = complements). YED: +ve = normal good, −ve = inferior good."},
      {title:"Tax Incidence",body:"Who bears the burden depends on relative elasticities. More inelastic side bears more. Drawn as a leftward shift of supply curve."}
    ],
    formulas:[
      {name:"PED",expr:"PED = %ΔQd / %ΔP",note:"Ignore sign unless asked"},
      {name:"PES",expr:"PES = %ΔQs / %ΔP",note:"Always positive"},
      {name:"YED",expr:"YED = %ΔQd / %ΔY",note:"Negative = inferior good"},
      {name:"XED",expr:"XED = %ΔQd(A) / %ΔP(B)",note:"+ve = substitutes, −ve = complements"},
      {name:"Total Revenue Test",expr:"PED > 1: ↑P → TR falls",note:"Elastic: P and TR move oppositely"},
      {name:"Tax burden (consumers)",expr:"Share = PES / (|PED| + PES)",note:"As absolute values"}
    ],
    examples:[
      {q:"Price rises from £10 to £12, quantity falls from 500 to 400. Calculate PED.",steps:[
        {t:"Calculate %ΔP: <code>(12−10)/10 × 100 = +20%</code>"},
        {t:"Calculate %ΔQd: <code>(400−500)/500 × 100 = −20%</code>"},
        {t:"PED = <code>−20% ÷ 20% = −1</code> → absolute value = 1"},
        {t:"Unit elastic — TR is unchanged at £5,000 before and after."}
      ],ans:"PED = 1 (unit elastic). Total revenue unchanged."},
      {q:"Tax of £4 imposed. |PED| = 0.5, PES = 1.5. How much do consumers bear?",steps:[
        {t:"Consumer share = <code>PES ÷ (|PED| + PES)</code>"},
        {t:"= <code>1.5 ÷ (0.5 + 1.5) = 1.5 ÷ 2.0 = 0.75</code>"},
        {t:"Consumer bears <code>0.75 × £4 = £3</code>"},
        {t:"Producer bears <code>£1</code>. More inelastic demand → larger consumer burden."}
      ],ans:"Consumers bear £3, producers £1."}
    ],
    diagrams:[{title:"Indirect Tax — Supply Shift",steps:[
      "Draw D and S₁ intersecting at P₁, Q₁",
      "Shift S LEFT to S₂ — vertical distance = tax per unit",
      "New equilibrium: P₂ (consumers pay more), Q₂ (lower output)",
      "Producer receives P₂ minus the tax amount (below original P₁ if inelastic)",
      "Tax revenue = grey rectangle (tax × Q₂) between the two price lines",
      "Deadweight loss = small triangle between Q₂ and Q₁, inside old equilibrium"
    ]}],
    quiz:[
      {q:"A good has PED = 0.3. Who bears most of a new indirect tax?",opts:["Producers — supply is elastic","Consumers — demand is inelastic","Split 50/50","Producers — demand is inelastic"],c:1,exp:"Inelastic demand (PED < 1) means consumers are less price-sensitive — firms can pass most of the tax on as higher prices."},
      {q:"YED for a good is −0.8. The good is:",opts:["A luxury normal good","A necessity","An inferior good","A complementary good"],c:2,exp:"Negative YED means demand falls as income rises — the definition of an inferior good."},
      {q:"Price rises £5→£6 and total revenue falls. PED is:",opts:["Inelastic (< 1)","Elastic (> 1)","Unit elastic = 1","Cannot determine"],c:1,exp:"If a price rise causes TR to fall, the quantity effect dominates — demand is elastic (PED > 1)."}
    ],
    qps:["Explain the TR test for PED","What determines PES in the long run?","Walk me through the tax incidence diagram"]
  },
  {
    id:1, week:"Week 2", type:"micro", title:"Costs, Revenue & Profit",
    focus:"Cost curves, revenue analytics and profit maximisation",
    topics:[
      {title:"Short-Run Cost Curves",body:"TC = FC + VC. AC = TC/Q. MC = ΔTC/ΔQ. MC cuts AC and AVC at their minimum points — a critical diagram rule."},
      {title:"Revenue Curves",body:"Perfect competition: P = AR = MR (horizontal). Monopoly: AR is the demand curve; MR lies below it with twice the gradient."},
      {title:"Profit Maximisation",body:"Produce where MC = MR. AR > AC → supernormal profit. AR = AC → normal profit. AR < AC → subnormal (economic loss)."},
      {title:"Economies of Scale",body:"Internal: technical, financial, managerial. External: localisation. LRAC falls as output expands; diseconomies set in beyond minimum efficient scale."}
    ],
    formulas:[
      {name:"Marginal Cost",expr:"MC = ΔTC / ΔQ",note:"Rate of change of total cost"},
      {name:"Average Cost",expr:"AC = TC / Q = AFC + AVC",note:"U-shaped in short run"},
      {name:"Average Revenue",expr:"AR = TR / Q = P",note:"= demand curve for monopolist"},
      {name:"Marginal Revenue",expr:"MR = ΔTR / ΔQ",note:"Slope of TR curve"},
      {name:"Profit",expr:"π = TR − TC = (AR − AC) × Q",note:"Second form for diagram areas"},
      {name:"Profit max",expr:"Produce where MC = MR",note:"MC must cut MR from below"}
    ],
    examples:[
      {q:"Q = 100, TC = £800, TR = £1,100. Calculate profit type.",steps:[
        {t:"Profit = TR − TC = <code>£1,100 − £800 = £300</code>"},
        {t:"AC = TC/Q = <code>£800/100 = £8</code>"},
        {t:"AR = TR/Q = <code>£1,100/100 = £11</code>"},
        {t:"AR (£11) > AC (£8) → <strong>supernormal profit</strong> of £300."}
      ],ans:"Supernormal profit = £300. In PC this attracts entry; in monopoly protected by barriers."},
      {q:"Monopolist: P = 100 − 2Q. Find profit-maximising Q if MC = 20.",steps:[
        {t:"AR = P = <code>100 − 2Q</code> (demand curve)"},
        {t:"TR = PQ = <code>100Q − 2Q²</code>"},
        {t:"MR = dTR/dQ = <code>100 − 4Q</code> (twice the slope of demand)"},
        {t:"MC = MR: <code>100 − 4Q = 20 → Q = 20, P = 100 − 40 = £60</code>"}
      ],ans:"Q* = 20, P* = £60. MR always has twice the gradient of linear demand."}
    ],
    diagrams:[{title:"Monopoly Profit Diagram",steps:[
      "Draw downward-sloping D (= AR) with MR below at twice the slope",
      "Draw U-shaped AC and MC; MC cuts AC at AC minimum",
      "Profit max: MC intersects MR — drop vertical to x-axis → Q*",
      "Go up from Q* to AR curve → P* (the price charged)",
      "Supernormal profit rectangle: height = AR − AC, width = Q*",
      "Deadweight loss: triangle between Q* and competitive Q, bounded by D and MC"
    ]}],
    quiz:[
      {q:"Q = 50, TC = £500, TR = £600. Profit per unit?",opts:["£2","£3","£5","£10"],c:0,exp:"Profit = £100. Per unit = £100/50 = £2. Equivalently AR − AC = £12 − £10 = £2."},
      {q:"MC cuts AC at:",opts:["AC maximum","AC minimum","Where AC = TR","Where MC = AR"],c:1,exp:"Mathematical law: MC < AC means AC is falling; MC > AC means rising. They intersect at AC's minimum."},

    qps:[
      "Explain the J-curve effect with a full diagram walkthrough",
      "What causes sterling to appreciate? List and explain each factor",
      "Evaluate whether a depreciation of the pound is good for the UK economy"
    ]
  }
];

const TABS = ['Overview','Formulae','Examples','Diagrams','Quiz','AI Tutor'];
let curWeek = 0;
let curTab = 0;
let quizState = {};
let chatHistory = {};
let aiLoading = false;

function tagClass(type){ return type==='micro'?'tag-micro':type==='macro'?'tag-macro':'tag-syn'; }
function dotClass(type){ return type==='micro'?'dot-micro':type==='macro'?'dot-macro':'dot-syn'; }
function typeLabel(type){ return type==='micro'?'Microeconomics':type==='macro'?'Macroeconomics':'Synoptic · P3'; }

// ── BUILD SIDEBAR ──
function buildSidebar(){
  document.getElementById('sidebar').innerHTML =
    `<div class="sb-lbl">8-Week Sprint</div>` +
    WEEKS.map(w=>`
      <div class="nav-item ${w.id===curWeek?'active':''}" onclick="gotoWeek(${w.id})">
        <div class="nav-dot ${dotClass(w.type)}"></div>
        <div class="nav-txt">
          <div class="nav-wk">${w.week}</div>
          <div class="nav-title">${w.title}</div>
        </div>
      </div>`).join('');
}

// ── BUILD TABS ──
function buildTabs(){
  const qs = quizState[curWeek];
  document.getElementById('tabs').innerHTML = TABS.map((t,i)=>`
    <div class="tab ${i===curTab?'active':''}" onclick="gotoTab(${i})">
      ${t}${t==='Quiz'&&qs&&qs.submitted?' ✓':''}
    </div>`).join('');
}

// ── RENDER PANEL ──
function renderPanel(){
  const w = WEEKS[curWeek];
  const panel = document.getElementById('panel');
  panel.style.animation='none';
  requestAnimationFrame(()=>{ panel.style.animation='fadeUp 0.2s ease'; });

  const hdr = `
    <div class="wk-hdr">
      <div class="wk-meta">
        <span class="wk-tag ${tagClass(w.type)}">${typeLabel(w.type)}</span>
        <span class="wk-num">${w.week} of 8</span>
      </div>
      <div class="wk-title">${w.title}</div>
      <div class="wk-focus">${w.focus}</div>
      <div class="prog"><div class="prog-fill" style="width:${((w.id+1)/8)*100}%"></div></div>
    </div>`;

  if(curTab===0) panel.innerHTML = hdr + renderOverview(w);
  else if(curTab===1) panel.innerHTML = hdr + renderFormulas(w);
  else if(curTab===2) panel.innerHTML = hdr + renderExamples(w);
  else if(curTab===3) panel.innerHTML = hdr + renderDiagrams(w);
  else if(curTab===4){ panel.innerHTML = hdr + renderQuiz(w); }
  else if(curTab===5){ panel.innerHTML=''; panel.style.padding='0'; renderTutor(w,panel); return; }
  panel.style.padding='18px 20px';
}

function renderOverview(w){
  return `<div class="tgrid">${w.topics.map(t=>`
    <div class="tc"><div class="tc-title">${t.title}</div><div class="tc-body">${t.body}</div></div>`).join('')}</div>
    <div style="margin-top:10px;">
      <div class="sec-lbl">Quick tutor prompts</div>
      <div class="qp-wrap">${w.qps.map(p=>`<button class="qp-btn" onclick="jumpToTutor('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}</div>
    </div>`;
}

function renderFormulas(w){
  return `<div class="sec-lbl">Key Formulae — ${w.title}</div>
    <div class="fgrid">${w.formulas.map(f=>`
      <div class="fc">
        <div class="fc-name">${f.name}</div>
        <div class="fc-expr">${f.expr}</div>
        <div class="fc-note">${f.note}</div>
      </div>`).join('')}</div>
    <div style="margin-top:14px;font-size:12px;color:var(--muted);font-style:italic;">
      Exam tip: In Paper 3 data questions, always write the formula first, then substitute — method marks are available even if the final answer is wrong.
    </div>`;
}

function renderExamples(w){
  return w.examples.map((ex,i)=>`
    <div class="ex-box">
      <div class="ex-hdr" onclick="toggleEx(${i})">
        <div>
          <div class="ex-lbl">Worked Example ${i+1}</div>
          <div class="ex-q">${ex.q}</div>
        </div>
        <div class="ex-toggle" id="ei${i}">▼</div>
      </div>
      <div class="ex-body" id="eb${i}">
        ${ex.steps.map((s,si)=>`
          <div class="step">
            <div class="step-n">${si+1}</div>
            <div class="step-c">${s.t}</div>
          </div>`).join('')}
        <div class="ans-box">✓ ${ex.ans}</div>
      </div>
    </div>`).join('') +
    `<p style="font-size:12px;color:var(--muted);font-style:italic;margin-top:8px;">Click to expand. Try working through each example yourself before revealing the steps.</p>`;
}

function renderDiagrams(w){
  return w.diagrams.map(d=>`
    <div class="dg">
      <div class="dg-title">${d.title}</div>
      <ol class="dg-steps">${d.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
    </div>`).join('') +
    `<div class="dg" style="border-color:rgba(200,151,58,0.2);background:rgba(200,151,58,0.025);">
      <div class="dg-title" style="color:var(--gold)">Edexcel Diagram Rules</div>
      <ol class="dg-steps">
        <li>Label BOTH axes (Price/Cost on Y, Quantity/Output on X)</li>
        <li>Label ALL curves clearly (D, S, MC, AC, MR, AR, AD, SRAS, LRAS)</li>
        <li>Mark equilibrium with dotted lines to both axes; label P* and Q*</li>
        <li>Shade areas explicitly asked for (profit, consumer surplus, DWL)</li>
        <li>Show shift direction with arrows on the curve itself</li>
        <li>Always refer to your diagram in your written answer</li>
      </ol>
    </div>`;
}

function renderQuiz(w){
  const qs = quizState[w.id] || {};
  if(qs.submitted){
    return `<div class="q-score">Score: ${qs.score} / ${w.quiz.length} — ${Math.round(qs.score/w.quiz.length*100)}%</div>`+
      w.quiz.map((q,i)=>`
        <div class="q-card">
          <div class="q-q">${i+1}. ${q.q}</div>
          <div class="q-opts">${q.opts.map((o,oi)=>`
            <button class="q-opt ${oi===q.c?'correct':qs.answers[i]===oi&&oi!==q.c?'wrong':''}" disabled>${o}</button>`).join('')}
          </div>
          <div class="q-exp show">${q.exp}</div>
        </div>`).join('') +
      `<button class="action-btn" style="margin-top:6px;" onclick="resetQuiz(${w.id})">Retry Quiz</button>`;
  }
  const ans = qs.answers||{};
  const answered = Object.keys(ans).length;
  return `<div class="q-score" id="qscore">${answered===0?`Question 1 of ${w.quiz.length}`:`${answered} of ${w.quiz.length} answered`}</div>`+
    w.quiz.map((q,i)=>`
      <div class="q-card">
        <div class="q-q">${i+1}. ${q.q}</div>
        <div class="q-opts">${q.opts.map((o,oi)=>`
          <button class="q-opt" id="q${i}o${oi}" onclick="pickAnswer(${i},${oi})"
            style="${ans[i]===oi?'border-color:var(--gold2);':''}">${o}</button>`).join('')}
        </div>
      </div>`).join('') +
    `<div id="submitRow" style="margin-top:8px;${answered===w.quiz.length?'':'display:none'}">
       <button class="action-btn submit" onclick="submitQuiz(${w.id})">Submit Answers</button>
     </div>`;
}

function pickAnswer(qi,oi){
  const w = WEEKS[curWeek];
  if(!quizState[curWeek]) quizState[curWeek]={answers:{},submitted:false,score:0};
  quizState[curWeek].answers[qi]=oi;
  // update button highlights
  w.quiz[qi].opts.forEach((_,i)=>{
    const b=document.getElementById(`q${qi}o${i}`);
    if(b) b.style.borderColor=i===oi?'var(--gold2)':'';
  });
  const answered=Object.keys(quizState[curWeek].answers).length;
  const sc=document.getElementById('qscore');
  if(sc) sc.textContent=`${answered} of ${w.quiz.length} answered`;
  const sr=document.getElementById('submitRow');
  if(sr&&answered===w.quiz.length) sr.style.display='block';
}

function submitQuiz(wid){
  const w=WEEKS[wid];
  const qs=quizState[wid];
  let score=0;
  w.quiz.forEach((q,i)=>{ if(qs.answers[i]===q.c) score++; });
  qs.score=score; qs.submitted=true;
  buildTabs(); renderPanel();
}

function resetQuiz(wid){
  quizState[wid]={answers:{},submitted:false,score:0};
  buildTabs(); renderPanel();
}

// ── AI TUTOR ──
function renderTutor(w,container){
  const msgs = chatHistory[w.id]||[];
  container.innerHTML=`
    <div class="tutor-wrap">
      <div class="tutor-top" id="chatMsgs">
        ${msgs.length===0
          ?`<div class="empty-state">Ask anything about ${w.title}…<br><span style="font-size:11px;color:var(--muted);font-style:normal;">Worked examples · exam technique · diagram walkthroughs</span></div>`
          :msgs.map(m=>`
            <div class="msg msg-${m.role}">
              <div class="msg-lbl">${m.role==='user'?'You':'Tutor'}</div>
              ${m.content}
            </div>`).join('')}
      </div>
      <div class="tutor-bottom">
        <div class="tutor-qps">
          ${w.qps.map(p=>`<button class="qp-btn" onclick="sendQuick('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
        </div>
        <div class="tutor-inp-row">
          <textarea class="tutor-inp" id="tutorInp" rows="1" placeholder="Ask about ${w.title}…" onkeydown="tutorKey(event)"></textarea>

```
      <button class="tutor-send" id="tutorSend" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>`;
```

const ta=document.getElementById(‘tutorInp’);
if(ta) ta.addEventListener(‘input’,function(){ this.style.height=‘auto’; this.style.height=Math.min(this.scrollHeight,80)+‘px’; });
scrollChat();
}

function scrollChat(){ const c=document.getElementById(‘chatMsgs’); if(c) c.scrollTop=c.scrollHeight; }

function tutorKey(e){ if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();sendMsg();} }

function sendQuick(text){
const inp=document.getElementById(‘tutorInp’);
if(inp){inp.value=text;sendMsg();}
}

function jumpToTutor(text){
curTab=5; buildTabs(); renderPanel();
setTimeout(()=>sendQuick(text),50);
}

async function sendMsg(){
if(aiLoading) return;
const inp=document.getElementById(‘tutorInp’);
const send=document.getElementById(‘tutorSend’);
if(!inp||!inp.value.trim()) return;
const text=inp.value.trim();
inp.value=’’; inp.style.height=‘auto’;
aiLoading=true; if(send) send.disabled=true;

const w=WEEKS[curWeek];
if(!chatHistory[curWeek]) chatHistory[curWeek]=[];
chatHistory[curWeek].push({role:‘user’,content:text});

const msgs=document.getElementById(‘chatMsgs’);
if(msgs){
msgs.innerHTML=chatHistory[curWeek].map(m=>` <div class="msg msg-${m.role}"> <div class="msg-lbl">${m.role==='user'?'You':'Tutor'}</div> ${m.content} </div>`).join(’’);
const typEl=document.createElement(‘div’);
typEl.className=‘msg msg-ai’; typEl.id=‘typing’;
typEl.innerHTML=`<div class="msg-lbl">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
msgs.appendChild(typEl);
scrollChat();
}

const system=`You are an expert Edexcel A Level Economics tutor. The student is currently on: “${w.title}” (${w.week}). Focus: ${w.focus}.

Topics this week: ${w.topics.map(t=>t.title).join(’, ‘)}.
Key formulae: ${w.formulas.map(f=>f.expr).join(’ | ’)}.

Instructions:

- Give clear, exam-focused answers with worked examples where helpful
- Use UK Edexcel A Level terminology precisely
- Reference diagrams by name (e.g. “on your AD/AS diagram”)
- Show calculations step-by-step
- Give exam technique tips where relevant
- Be concise but thorough
- Use short paragraphs; bullet points for lists
- Use **bold** for key terms, backtick code for formulae/numbers
- Mention Edexcel mark scheme language where helpful (e.g. “KAA + evaluation”, “Level 3 analysis”)`;
  
  const apiMessages=chatHistory[curWeek].map(m=>({
  role:m.role===‘ai’?‘assistant’:‘user’,
  content:m.content.replace(/<[^>]*>/g,’’)
  }));
  
  try{
  const res=await fetch(‘https://api.anthropic.com/v1/messages’,{
  method:‘POST’,
  headers:{‘Content-Type’:‘application/json’},
  body:JSON.stringify({
  model:‘claude-sonnet-4-20250514’,
  max_tokens:1000,
  system,
  messages:apiMessages
  })
  });
  const data=await res.json();
  const raw=data.content?.[0]?.text||‘Sorry, no response received. Please try again.’;
  const fmt=raw
  .replace(/**(.*?)**/g,’<strong>$1</strong>’)
  .replace(/`([^`]+)`/g,’<code>$1</code>’)
  .replace(/\n\n/g,’<br><br>’)
  .replace(/\n/g,’<br>’);
  chatHistory[curWeek].push({role:‘ai’,content:fmt});
  } catch(e){
  chatHistory[curWeek].push({role:‘ai’,content:‘Network error — please try again.’});
  }
  
  const ty=document.getElementById(‘typing’);
  if(ty) ty.remove();
  const m2=document.getElementById(‘chatMsgs’);
  if(m2){
  m2.innerHTML=chatHistory[curWeek].map(m=>` <div class="msg msg-${m.role}"> <div class="msg-lbl">${m.role==='user'?'You':'Tutor'}</div> ${m.content} </div>`).join(’’);
  scrollChat();
  }
  aiLoading=false; if(send) send.disabled=false;
  const inp2=document.getElementById(‘tutorInp’);
  if(inp2) inp2.focus();
  }

function toggleEx(i){
const b=document.getElementById(`eb${i}`);
const ic=document.getElementById(`ei${i}`);
if(b.classList.contains(‘open’)){b.classList.remove(‘open’);ic.textContent=‘▼’;}
else{b.classList.add(‘open’);ic.textContent=‘▲’;}
}

function gotoWeek(id){ curWeek=id; curTab=0; buildSidebar(); buildTabs(); renderPanel(); }
function gotoTab(i){ curTab=i; buildTabs(); renderPanel(); }

// ── INIT ──
buildSidebar(); buildTabs(); renderPanel();
</script>
