<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Edexcel A Economics Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#13110f;
  --parchment:#f2ede3;
  --cream:#e8e2d4;
  --gold:#c8973a;
  --gold2:#e0b870;
  --teal:#2a7268;
  --teal2:#3aa898;
  --muted:#6b6050;
  --border:rgba(200,151,58,0.22);
  --border2:rgba(200,151,58,0.10);
  --purple:#9b8fd0;
}
*{box-sizing:border-box;margin:0;padding:0;}

/* ── MOBILE-SAFE FULL HEIGHT ── */
html{height:100%;height:-webkit-fill-available;}
body{
min-height:100vh;
min-height:-webkit-fill-available;
background:var(–ink);
color:var(–parchment);
font-family:‘Crimson Pro’,Georgia,serif;
font-size:16px;
line-height:1.7;
display:flex;
flex-direction:column;
overflow:hidden;
}
body::before{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background-image:
repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(200,151,58,0.016) 60px,rgba(200,151,58,0.016) 61px),
repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(200,151,58,0.01) 60px,rgba(200,151,58,0.01) 61px);
}

/* ── SHELL ── */
.shell{
position:relative;z-index:1;
display:flex;flex-direction:column;
height:100vh;height:-webkit-fill-available;
overflow:hidden;
}

/* ── HEADER ── */
.hdr{
display:flex;align-items:center;justify-content:space-between;gap:10px;
padding:10px 16px;
border-bottom:1px solid var(–border);
flex-shrink:0;
background:rgba(19,17,15,0.97);
padding-top:max(10px, env(safe-area-inset-top));
}
.hdr-left{display:flex;align-items:baseline;gap:10px;min-width:0;}
.hdr-title{font-family:‘Playfair Display’,serif;font-size:1.1rem;font-weight:600;color:var(–gold2);white-space:nowrap;}
.hdr-sub{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(–muted);white-space:nowrap;}
.hdr-badges{display:flex;gap:5px;flex-shrink:0;}
.bdg{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.07em;text-transform:uppercase;padding:2px 6px;border-radius:2px;border:1px solid;white-space:nowrap;}
.bdg-t{border-color:rgba(58,168,152,0.4);color:var(–teal2);}
.bdg-g{border-color:var(–border);color:var(–gold);}
.bdg-r{border-color:rgba(155,143,208,0.4);color:var(–purple);}

/* ── WEEK PICKER (horizontal scroll strip, replaces sidebar on mobile) ── */
.week-strip{
display:flex;gap:0;
overflow-x:auto;
border-bottom:1px solid var(–border2);
flex-shrink:0;
background:rgba(19,17,15,0.6);
-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}
.week-strip::-webkit-scrollbar{display:none;}
.wk-pill{
display:flex;flex-direction:column;align-items:center;
padding:8px 14px;cursor:pointer;
border-bottom:2px solid transparent;
flex-shrink:0;transition:all 0.12s;gap:2px;
min-width:72px;
}
.wk-pill:hover{background:rgba(200,151,58,0.04);}
.wk-pill.active{border-bottom-color:var(–gold);background:rgba(200,151,58,0.07);}
.wk-pill.active .wk-pill-label{color:var(–gold2);}
.wk-pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot-micro{background:var(–teal2);}
.dot-macro{background:var(–purple);}
.dot-syn{background:var(–gold);}
.wk-pill-num{font-family:‘DM Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:0.08em;text-transform:uppercase;}
.wk-pill-label{font-size:11px;color:var(–parchment);line-height:1.2;text-align:center;max-width:80px;}

/* ── TABS ── */
.tabs{
display:flex;border-bottom:1px solid var(–border2);
flex-shrink:0;overflow-x:auto;
-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.07em;text-transform:uppercase;
padding:9px 13px;cursor:pointer;color:var(–muted);white-space:nowrap;
border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.12s;flex-shrink:0;
}
.tab:hover{color:var(–parchment);}
.tab.active{color:var(–gold2);border-bottom-color:var(–gold);}

/* ── PANEL ── */
.panel{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.panel::-webkit-scrollbar{width:2px;}
.panel::-webkit-scrollbar-thumb{background:var(–border2);border-radius:1px;}

/* ── WEEK HEADER ── */
.wk-hdr{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(–border2);}
.wk-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.wk-tag{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px;}
.tag-micro{background:rgba(42,114,104,0.18);color:var(–teal2);border:1px solid rgba(58,168,152,0.25);}
.tag-macro{background:rgba(155,143,208,0.12);color:var(–purple);border:1px solid rgba(155,143,208,0.25);}
.tag-syn{background:rgba(200,151,58,0.12);color:var(–gold2);border:1px solid var(–border);}
.wk-num{font-family:‘DM Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:0.1em;text-transform:uppercase;}
.wk-title{font-family:‘Playfair Display’,serif;font-size:1.3rem;font-weight:600;color:var(–parchment);line-height:1.2;margin-bottom:3px;}
.wk-focus{color:var(–muted);font-style:italic;font-size:13px;}
.prog{height:2px;background:var(–border2);border-radius:1px;margin-top:8px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(–teal2),var(–gold));border-radius:1px;transition:width 0.4s;}

/* ── TOPIC CARDS ── */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
@media(max-width:480px){.tgrid{grid-template-columns:1fr;}}
.tc{border:1px solid var(–border2);border-radius:3px;padding:11px 12px;background:rgba(255,255,255,0.015);}
.tc-title{font-size:12px;color:var(–gold2);margin-bottom:4px;font-family:‘Playfair Display’,serif;}
.tc-body{font-size:12px;color:var(–muted);line-height:1.5;}

/* ── QUICK PROMPTS ── */
.qp-wrap{margin-bottom:10px;display:flex;gap:5px;flex-wrap:wrap;}
.qp-btn{
font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.06em;text-transform:uppercase;
padding:5px 9px;border-radius:2px;border:1px solid var(–border);
background:transparent;color:var(–muted);cursor:pointer;transition:all 0.12s;
}
.qp-btn:hover{border-color:var(–gold);color:var(–gold2);}

/* ── FORMULA ── */
.sec-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(–muted);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(–border2);}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;}
.fc{background:rgba(42,114,104,0.07);border:1px solid rgba(58,168,152,0.18);border-radius:3px;padding:9px 11px;}
.fc-name{font-family:‘DM Mono’,monospace;font-size:9px;color:var(–teal2);margin-bottom:3px;letter-spacing:0.04em;}
.fc-expr{font-family:‘DM Mono’,monospace;font-size:13px;color:var(–parchment);font-weight:500;line-height:1.3;}
.fc-note{font-size:11px;color:var(–muted);margin-top:3px;font-style:italic;}

/* ── WORKED EXAMPLES ── */
.ex-box{border:1px solid var(–border);border-radius:3px;background:rgba(200,151,58,0.03);margin-bottom:9px;overflow:hidden;}
.ex-hdr{background:rgba(200,151,58,0.07);padding:8px 12px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;gap:8px;}
.ex-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.08em;color:var(–gold);text-transform:uppercase;margin-bottom:2px;}
.ex-q{font-size:12px;color:var(–parchment);line-height:1.4;}
.ex-toggle{color:var(–gold);font-size:11px;flex-shrink:0;margin-top:2px;}
.ex-body{padding:12px;display:none;}
.ex-body.open{display:block;}
.step{display:flex;gap:8px;margin-bottom:8px;}
.step-n{width:18px;height:18px;border-radius:50%;background:var(–teal);color:#fff;font-family:‘DM Mono’,monospace;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-c{flex:1;font-size:12px;color:var(–cream);line-height:1.5;}
.step-c code{font-family:‘DM Mono’,monospace;background:rgba(58,168,152,0.12);color:var(–teal2);padding:1px 4px;border-radius:2px;font-size:11px;}
.ans-box{background:rgba(42,114,104,0.1);border:1px solid rgba(58,168,152,0.22);border-radius:2px;padding:8px 11px;margin-top:7px;font-family:‘DM Mono’,monospace;font-size:11px;color:var(–teal2);}

/* ── DIAGRAMS ── */
.dg{border:1px solid var(–border2);border-radius:3px;padding:12px;margin-bottom:9px;background:rgba(255,255,255,0.012);}
.dg-title{font-family:‘Playfair Display’,serif;font-size:13px;color:var(–gold2);margin-bottom:7px;}
.dg-steps{list-style:none;counter-reset:sc;}
.dg-steps li{font-size:12px;color:var(–cream);padding:3px 0 3px 16px;position:relative;line-height:1.45;counter-increment:sc;}
.dg-steps li::before{content:counter(sc);position:absolute;left:0;font-family:‘DM Mono’,monospace;font-size:8px;color:var(–gold);top:5px;}

/* ── QUIZ ── */
.q-score{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–gold);margin-bottom:9px;letter-spacing:0.06em;}
.q-card{border:1px solid var(–border2);border-radius:3px;padding:12px;background:rgba(255,255,255,0.012);margin-bottom:9px;}
.q-q{font-size:13px;color:var(–parchment);margin-bottom:9px;line-height:1.5;}
.q-opts{display:flex;flex-direction:column;gap:5px;}
.q-opt{padding:8px 11px;border-radius:2px;border:1px solid var(–border2);background:transparent;color:var(–cream);font-size:13px;cursor:pointer;text-align:left;transition:all 0.1s;font-family:‘Crimson Pro’,serif;line-height:1.4;}
.q-opt:hover:not(:disabled){border-color:var(–gold);background:rgba(200,151,58,0.04);}
.q-opt.correct{background:rgba(42,114,104,0.18);border-color:var(–teal2);color:var(–teal2);}
.q-opt.wrong{background:rgba(139,38,53,0.12);border-color:#c05060;color:#d07080;}
.q-exp{font-size:12px;color:var(–muted);margin-top:7px;font-style:italic;line-height:1.5;display:none;}
.q-exp.show{display:block;}
.action-btn{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:7px 13px;border-radius:2px;border:1px solid var(–border);background:transparent;color:var(–muted);cursor:pointer;transition:all 0.12s;}
.action-btn.submit{border-color:rgba(58,168,152,0.5);color:var(–teal2);background:rgba(42,114,104,0.08);}

/* ── AI TUTOR ── */
.tutor-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.tutor-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;min-height:0;-webkit-overflow-scrolling:touch;}
.tutor-msgs::-webkit-scrollbar{width:2px;}
.tutor-msgs::-webkit-scrollbar-thumb{background:var(–border2);}
.empty-state{color:var(–muted);font-size:13px;text-align:center;padding:2rem 1rem;font-style:italic;margin:auto;}
.msg{max-width:90%;font-size:13px;line-height:1.6;}
.msg-user{align-self:flex-end;background:rgba(42,114,104,0.18);border:1px solid rgba(58,168,152,0.22);border-radius:3px 3px 0 3px;padding:7px 10px;color:var(–cream);}
.msg-ai{align-self:flex-start;background:rgba(200,151,58,0.06);border:1px solid var(–border2);border-radius:3px 3px 3px 0;padding:8px 12px;color:var(–parchment);}
.msg-ai strong{color:var(–gold2);font-weight:500;}
.msg-ai code{font-family:‘DM Mono’,monospace;background:rgba(58,168,152,0.12);color:var(–teal2);padding:1px 4px;border-radius:2px;font-size:11px;}
.msg-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;color:var(–muted);}
.typing{display:flex;gap:3px;align-items:center;padding:3px 0;}
.typing span{width:4px;height:4px;border-radius:50%;background:var(–gold);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.tutor-footer{flex-shrink:0;border-top:1px solid var(–border2);padding-bottom:env(safe-area-inset-bottom);}
.tutor-qps{display:flex;gap:5px;flex-wrap:wrap;padding:7px 12px;border-bottom:1px solid var(–border2);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;}
.tutor-qps::-webkit-scrollbar{display:none;}
.tutor-inp-row{display:flex;}
.tutor-inp{flex:1;background:transparent;border:none;outline:none;padding:10px 13px;font-family:‘Crimson Pro’,serif;font-size:15px;color:var(–parchment);resize:none;max-height:80px;-webkit-appearance:none;}
.tutor-inp::placeholder{color:var(–muted);}
.tutor-send{padding:10px 14px;background:transparent;border:none;border-left:1px solid var(–border2);cursor:pointer;font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(–muted);white-space:nowrap;}
.tutor-send:disabled{opacity:0.35;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel{animation:fadeUp 0.18s ease;}
</style>

</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">Economics Tutor</div>
      <div class="hdr-sub">Edexcel A · May 2026</div>
    </div>
    <div class="hdr-badges">
      <span class="bdg bdg-t">Micro</span>
      <span class="bdg bdg-g">Macro</span>
      <span class="bdg bdg-r">P3</span>
    </div>
  </div>

  <div class="week-strip" id="weekStrip"></div>
  <div class="tabs" id="tabs"></div>
  <div class="panel" id="panel"></div>

</div>
<script>
const W=[
  {id:0,week:"Wk 1",type:"micro",title:"Supply & Demand Analytics",focus:"Price mechanism, elasticity calculations and tax incidence",
   topics:[
     {title:"Price Elasticity of Demand",body:"Measures responsiveness of Qd to price change. PED > 1 = elastic (luxury goods), PED < 1 = inelastic (necessities). Negative by convention."},
     {title:"Price Elasticity of Supply",body:"Responsiveness of Qs to price. Higher with more time (SR vs LR), spare capacity, easily stored goods, and non-specific factors of production."},
     {title:"Cross & Income Elasticity",body:"XED: demand response to another good's price (+ve = substitutes, −ve = complements). YED: +ve = normal good, −ve = inferior good."},
     {title:"Tax Incidence",body:"Who bears the burden depends on relative elasticities. More inelastic side bears more. Drawn as a leftward shift of supply curve."}
   ],
   formulas:[
     {name:"PED",expr:"PED = %ΔQd / %ΔP",note:"Ignore sign unless asked"},
     {name:"PES",expr:"PES = %ΔQs / %ΔP",note:"Always positive"},
     {name:"YED",expr:"YED = %ΔQd / %ΔY",note:"Negative = inferior good"},
     {name:"XED",expr:"XED = %ΔQd(A) / %ΔP(B)",note:"+ve = substitutes, −ve = complements"},
     {name:"Total Revenue Test",expr:"PED > 1: ↑P → TR falls",note:"Elastic: P and TR move oppositely"},
     {name:"Tax burden (consumers)",expr:"Share = PES / (|PED| + PES)",note:"As absolute values"}
   ],
   examples:[
     {q:"Price rises from £10 to £12, quantity falls 500→400. Calculate PED.",steps:[
       {t:"Calculate %ΔP: <code>(12−10)/10 × 100 = +20%</code>"},
       {t:"Calculate %ΔQd: <code>(400−500)/500 × 100 = −20%</code>"},
       {t:"PED = <code>−20% ÷ 20% = −1</code> → absolute value = 1"},
       {t:"Unit elastic — TR unchanged at £5,000 before and after."}
     ],ans:"PED = 1 (unit elastic). Total revenue unchanged."},
     {q:"Tax £4. |PED| = 0.5, PES = 1.5. How much do consumers bear?",steps:[
       {t:"Consumer share = <code>PES ÷ (|PED| + PES)</code>"},
       {t:"= <code>1.5 ÷ (0.5 + 1.5) = 0.75</code>"},
       {t:"Consumer bears <code>0.75 × £4 = £3</code>"},
       {t:"Producer bears <code>£1</code>. More inelastic demand → larger consumer burden."}
     ],ans:"Consumers £3, producers £1."}
   ],
   diagrams:[{title:"Indirect Tax — Supply Shift",steps:[
     "Draw D and S₁ intersecting at P₁, Q₁",
     "Shift S LEFT to S₂ — vertical distance = tax per unit",
     "New equilibrium: P₂ (consumers pay more), Q₂ (lower output)",
     "Producer receives P₂ minus the tax (below P₁ if inelastic supply)",
     "Tax revenue rectangle = tax × Q₂ between the two price lines",
     "Deadweight loss = small triangle between Q₂ and Q₁"
   ]}],
   quiz:[
     {q:"PED = 0.3. Who bears most of a new indirect tax?",opts:["Producers — supply is elastic","Consumers — demand is inelastic","Split 50/50","Producers — demand is inelastic"],c:1,exp:"Inelastic demand (PED < 1) means consumers are less price-sensitive — firms can pass most of the tax on as higher prices."},
     {q:"YED = −0.8. The good is:",opts:["A luxury normal good","A necessity","An inferior good","A complementary good"],c:2,exp:"Negative YED means demand falls as income rises — the definition of an inferior good."},
     {q:"Price rises £5→£6 and TR falls. PED is:",opts:["Inelastic (< 1)","Elastic (> 1)","Unit elastic = 1","Cannot determine"],c:1,exp:"If a price rise causes TR to fall, the quantity effect dominates — demand is elastic (PED > 1)."}
   ],
   qps:["Explain the TR test for PED","What determines PES in the long run?","Walk me through the tax incidence diagram"]
  },
  {id:1,week:"Wk 2",type:"micro",title:"Costs, Revenue & Profit",focus:"Cost curves, revenue analytics and profit maximisation",
   topics:[
     {title:"Short-Run Cost Curves",body:"TC = FC + VC. AC = TC/Q. MC = ΔTC/ΔQ. MC cuts AC and AVC at their minimum points — a critical diagram rule."},
     {title:"Revenue Curves",body:"Perfect competition: P = AR = MR (horizontal). Monopoly: AR is the demand curve; MR lies below it with twice the gradient."},
     {title:"Profit Maximisation",body:"Produce where MC = MR. AR > AC → supernormal profit. AR = AC → normal profit. AR < AC → subnormal (economic loss)."},
     {title:"Economies of Scale",body:"Internal: technical, financial, managerial. External: localisation. LRAC falls as output expands; diseconomies set in beyond minimum efficient scale."}
   ],
   formulas:[
     {name:"Marginal Cost",expr:"MC = ΔTC / ΔQ",note:"Rate of change of total cost"},
     {name:"Average Cost",expr:"AC = TC / Q = AFC + AVC",note:"U-shaped in short run"},
     {name:"Average Revenue",expr:"AR = TR / Q = P",note:"= demand curve for monopolist"},
     {name:"Marginal Revenue",expr:"MR = ΔTR / ΔQ",note:"Slope of TR curve"},
     {name:"Profit",expr:"π = TR − TC = (AR − AC) × Q",note:"Second form for diagram areas"},
     {name:"Profit max",expr:"Produce where MC = MR",note:"MC must cut MR from below"}
   ],
   examples:[
     {q:"Q=100, TC=£800, TR=£1,100. Calculate profit type.",steps:[
       {t:"Profit = TR − TC = <code>£1,100 − £800 = £300</code>"},
       {t:"AC = TC/Q = <code>£800/100 = £8</code>"},
       {t:"AR = TR/Q = <code>£1,100/100 = £11</code>"},
       {t:"AR (£11) > AC (£8) → <strong>supernormal profit</strong> of £300."}
     ],ans:"Supernormal profit = £300. In PC this attracts entry; in monopoly protected by barriers."},
     {q:"Monopolist: P = 100 − 2Q. Find profit-max Q if MC = 20.",steps:[
       {t:"AR = P = <code>100 − 2Q</code> (demand curve)"},
       {t:"TR = PQ = <code>100Q − 2Q²</code>"},
       {t:"MR = dTR/dQ = <code>100 − 4Q</code> (twice the slope of demand)"},
       {t:"MC = MR: <code>100 − 4Q = 20 → Q = 20, P = £60</code>"}
     ],ans:"Q* = 20, P* = £60. MR always has twice the gradient of linear demand."}
   ],
   diagrams:[{title:"Monopoly Profit Diagram",steps:[
     "Draw downward-sloping D (= AR) with MR below at twice the slope",
     "Draw U-shaped AC and MC; MC cuts AC at AC minimum",
     "Profit max: MC intersects MR — drop vertical to x-axis → Q*",
     "Go up from Q* to AR curve → P* (price charged)",
     "Supernormal profit rectangle: height = AR − AC, width = Q*",
     "Deadweight loss: triangle between Q* and competitive Q, bounded by D and MC"
   ]}],
   quiz:[
     {q:"Q=50, TC=£500, TR=£600. Profit per unit?",opts:["£2","£3","£5","£10"],c:0,exp:"Profit = £100. Per unit = £100/50 = £2. Equivalently AR − AC = £12 − £10 = £2."},
     {q:"MC cuts AC at:",opts:["AC maximum","AC minimum","Where AC = TR","Where MC = AR"],c:1,exp:"Mathematical law: MC < AC means AC is falling; MC > AC means rising. They intersect at AC's minimum."},
     {q:"A firm operates where MC > MR. It should:",opts:["Expand output","Reduce output","Maintain — profit maximised","Shut down"],c:1,exp:"MC > MR means the last unit costs more than it earns. Reduce output until MC = MR."}
   ],
   qps:["Why does MR = half the slope of demand for monopoly?","How do I shade profit area on a diagram?","What is normal profit and why does it matter?"]
  },
  {id:2,week:"Wk 3",type:"micro",title:"Market Structures",focus:"Perfect competition, monopoly, oligopoly — comparative analytics",
   topics:[

// scroll active pill into view
setTimeout(()=>{
const active=s.querySelector(’.active’);
if(active) active.scrollIntoView({behavior:‘smooth’,inline:‘center’,block:‘nearest’});
},50);
}

function buildTabs(){
const q=qS[cW];
document.getElementById(‘tabs’).innerHTML=TABS.map((t,i)=>` <div class="tab ${i===cT?'active':''}" onclick="goT(${i})"> ${t}${t==='Quiz'&&q&&q.sub?' ✓':''} </div>`).join(’’);
}

function renderPanel(){
const w=W[cW];
const p=document.getElementById(‘panel’);
p.style.animation=‘none’;
requestAnimationFrame(()=>{p.style.animation=‘fadeUp 0.18s ease’;});

const hdr=`<div class="wk-hdr">
<div class="wk-meta">
<span class="wk-tag ${tagC(w.type)}">${typeL(w.type)}</span>
<span class="wk-num">${w.week} of 8</span>
</div>
<div class="wk-title">${w.title}</div>
<div class="wk-focus">${w.focus}</div>
<div class="prog"><div class="prog-fill" style="width:${((w.id+1)/8)*100}%"></div></div>

  </div>`;

if(cT===5){p.innerHTML=’’;p.style.padding=‘0’;renderTutor(w,p);return;}
p.style.padding=‘16px’;

if(cT===0) p.innerHTML=hdr+renderOverview(w);
else if(cT===1) p.innerHTML=hdr+renderFormulas(w);
else if(cT===2) p.innerHTML=hdr+renderExamples(w);
else if(cT===3) p.innerHTML=hdr+renderDiagrams(w);
else if(cT===4) p.innerHTML=hdr+renderQuiz(w);
}

function renderOverview(w){
return `<div class="tgrid">${w.topics.map(t=>`
<div class="tc"><div class="tc-title">${t.title}</div><div class="tc-body">${t.body}</div></div>`).join('')}</div> <div style="margin-top:10px;"> <div class="sec-lbl">Quick tutor prompts</div> <div class="qp-wrap">${w.qps.map(p=>`<button class=“qp-btn” onclick=“jumpTutor(’${p.replace(/’/g,”\’”)}’)”>↗ ${p}</button>`).join('')}</div> </div>`;
}

function renderFormulas(w){
return `<div class="sec-lbl">Key Formulae — ${w.title}</div> <div class="fgrid">${w.formulas.map(f=>`
<div class="fc">
<div class="fc-name">${f.name}</div>
<div class="fc-expr">${f.expr}</div>
<div class="fc-note">${f.note}</div>
</div>`).join('')}</div> <div style="margin-top:12px;font-size:11px;color:var(--muted);font-style:italic;"> Exam tip: Always write the formula first, then substitute — method marks are available even if the final answer is wrong. </div>`;
}

function renderExamples(w){
return w.examples.map((ex,i)=>` <div class="ex-box"> <div class="ex-hdr" onclick="togEx(${i})"> <div> <div class="ex-lbl">Worked Example ${i+1}</div> <div class="ex-q">${ex.q}</div> </div> <div class="ex-toggle" id="ei${i}">▼</div> </div> <div class="ex-body" id="eb${i}"> ${ex.steps.map((s,si)=>`
<div class="step">
<div class="step-n">${si+1}</div>
<div class="step-c">${s.t}</div>
</div>`).join('')} <div class="ans-box">✓ ${ex.ans}</div> </div> </div>`).join(’’)+
`<p style="font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;">Tap to expand. Try the question yourself before revealing the steps.</p>`;
}

function renderDiagrams(w){
return w.diagrams.map(d=>` <div class="dg"> <div class="dg-title">${d.title}</div> <ol class="dg-steps">${d.steps.map(s=>`<li>${s}</li>`).join('')}</ol> </div>`).join(’’)+
`<div class="dg" style="border-color:rgba(200,151,58,0.2);background:rgba(200,151,58,0.025);"> <div class="dg-title" style="color:var(--gold)">Edexcel Diagram Rules</div> <ol class="dg-steps"> <li>Label BOTH axes (Price/Cost on Y-axis, Quantity/Output on X-axis)</li> <li>Label ALL curves (D, S, MC, AC, MR, AR, AD, SRAS, LRAS)</li> <li>Mark equilibrium with dotted lines to both axes; label P* and Q*</li> <li>Shade areas explicitly asked for (profit, consumer surplus, DWL)</li> <li>Show shift direction with arrows on the curve itself</li> <li>Always refer to your diagram in the written answer</li> </ol> </div>`;
}

function renderQuiz(w){
const q=qS[w.id]||{};
if(q.sub){
return `<div class="q-score">Score: ${q.score} / ${w.quiz.length} — ${Math.round(q.score/w.quiz.length*100)}%</div>`+
w.quiz.map((qz,i)=>` <div class="q-card"> <div class="q-q">${i+1}. ${qz.q}</div> <div class="q-opts">${qz.opts.map((o,oi)=>`
<button class="q-opt ${oi===qz.c?'correct':q.ans[i]===oi&&oi!==qz.c?'wrong':''}" disabled>${o}</button>`).join('')}</div> <div class="q-exp show">${qz.exp}</div> </div>`).join(’’)+
`<button class="action-btn" style="margin-top:6px;" onclick="resetQ(${w.id})">Retry Quiz</button>`;
}
const a=q.ans||{};
const done=Object.keys(a).length;
return `<div class="q-score" id="qsc">${done===0?`Question 1 of ${w.quiz.length}`:`${done} of ${w.quiz.length} answered`}</div>`+
w.quiz.map((qz,i)=>` <div class="q-card"> <div class="q-q">${i+1}. ${qz.q}</div> <div class="q-opts">${qz.opts.map((o,oi)=>`
<button class="q-opt" id="q${i}o${oi}" onclick="pickA(${i},${oi})"
style="${a[i]===oi?'border-color:var(--gold2);':''}">${o}</button>`).join('')}</div> </div>`).join(’’)+
`<div id="subRow" style="margin-top:8px;${done===w.quiz.length?'':'display:none'}"> <button class="action-btn submit" onclick="submitQ(${w.id})">Submit Answers</button> </div>`;
}

function pickA(qi,oi){
const w=W[cW];
if(!qS[cW]) qS[cW]={ans:{},sub:false,score:0};
qS[cW].ans[qi]=oi;
w.quiz[qi].opts.forEach((_,i)=>{
const b=document.getElementById(`q${qi}o${i}`);
if(b) b.style.borderColor=i===oi?‘var(–gold2)’:’’;
});
const done=Object.keys(qS[cW].ans).length;
const sc=document.getElementById(‘qsc’);
if(sc) sc.textContent=`${done} of ${w.quiz.length} answered`;
const sr=document.getElementById(‘subRow’);
if(sr&&done===w.quiz.length) sr.style.display=‘block’;
}

function submitQ(wid){
const w=W[wid];const q=qS[wid];let s=0;
w.quiz.forEach((qz,i)=>{if(q.ans[i]===qz.c) s++;});
q.score=s;q.sub=true;
buildTabs();renderPanel();
}

function resetQ(wid){
qS[wid]={ans:{},sub:false,score:0};
buildTabs();renderPanel();
}

function renderTutor(w,container){
const msgs=cH[w.id]||[];
container.innerHTML=` <div class="tutor-wrap"> <div class="tutor-msgs" id="chatMsgs"> ${msgs.length===0 ?`<div class="empty-state">Ask anything about ${w.title}…<br><span style="font-size:11px;font-style:normal;">Worked examples · exam technique · diagram walkthroughs</span></div>` :msgs.map(m=>`<div class="msg msg-${m.r}"><div class="msg-lbl">${m.r===‘user’?‘You’:‘Tutor’}</div>${m.c}</div>`).join('')} </div> <div class="tutor-footer"> <div class="tutor-qps"> ${w.qps.map(p=>`<button class=“qp-btn” onclick=“quickSend(’${p.replace(/’/g,”\’”)}’)”>↗ ${p}</button>`).join('')} </div> <div class="tutor-inp-row"> <textarea class="tutor-inp" id="tInp" rows="1" placeholder="Ask about ${w.title}…" onkeydown="tKey(event)"></textarea> <button class="tutor-send" id="tSend" onclick="sendMsg()">Send</button> </div> </div> </div>`;
const ta=document.getElementById(‘tInp’);
if(ta) ta.addEventListener(‘input’,function(){this.style.height=‘auto’;this.style.height=Math.min(this.scrollHeight,80)+‘px’;});
scrollC();
}

function scrollC(){const c=document.getElementById(‘chatMsgs’);if(c) c.scrollTop=c.scrollHeight;}

function tKey(e){if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();sendMsg();}}

function quickSend(t){const i=document.getElementById(‘tInp’);if(i){i.value=t;sendMsg();}}

function jumpTutor(t){cT=5;buildTabs();renderPanel();setTimeout(()=>quickSend(t),60);}

async function sendMsg(){
if(aiL) return;
const inp=document.getElementById(‘tInp’);
const send=document.getElementById(‘tSend’);
if(!inp||!inp.value.trim()) return;
const text=inp.value.trim();
inp.value=’’;inp.style.height=‘auto’;
aiL=true;if(send) send.disabled=true;

const w=W[cW];
if(!cH[cW]) cH[cW]=[];
cH[cW].push({r:‘user’,c:text});

const msgs=document.getElementById(‘chatMsgs’);
if(msgs){
msgs.innerHTML=cH[cW].map(m=>`<div class="msg msg-${m.r}"><div class="msg-lbl">${m.r==='user'?'You':'Tutor'}</div>${m.c}</div>`).join(’’);
const tp=document.createElement(‘div’);
tp.className=‘msg msg-ai’;tp.id=‘typing’;
tp.innerHTML=`<div class="msg-lbl">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
msgs.appendChild(tp);scrollC();
}

const sys=`You are an expert Edexcel A Level Economics tutor. Student is on: "${w.title}" (${w.week}). Focus: ${w.focus}. Topics: ${w.topics.map(t=>t.title).join(', ')}. Formulae: ${w.formulas.map(f=>f.expr).join(' | ')}. Instructions: clear exam-focused answers; use UK Edexcel A Level terminology; show calculations step-by-step; give exam technique tips; be concise but thorough; use **bold** for key terms, backtick code for formulae/numbers; mention Edexcel mark scheme language (KAA, evaluation, Level 3 analysis) where helpful.`;

const apiMsgs=cH[cW].map(m=>({role:m.r===‘ai’?‘assistant’:‘user’,content:m.c.replace(/<[^>]*>/g,’’)}));

try{
const res=await fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:1000,system:sys,messages:apiMsgs})
});
const data=await res.json();
const raw=data.content?.[0]?.text||‘Sorry, no response. Please try again.’;
const fmt=raw
.replace(/**(.*?)**/g,’<strong>$1</strong>’)
.replace(/`([^`]+)`/g,’<code>$1</code>’)
.replace(/\n\n/g,’<br><br>’)
.replace(/\n/g,’<br>’);
cH[cW].push({r:‘ai’,c:fmt});
}catch(e){
cH[cW].push({r:‘ai’,c:‘Network error — please check your connection and try again.’});
}

const ty=document.getElementById(‘typing’);if(ty) ty.remove();
const m2=document.getElementById(‘chatMsgs’);
if(m2){
m2.innerHTML=cH[cW].map(m=>`<div class="msg msg-${m.r}"><div class="msg-lbl">${m.r==='user'?'You':'Tutor'}</div>${m.c}</div>`).join(’’);
scrollC();
}
aiL=false;if(send) send.disabled=false;
const i2=document.getElementById(‘tInp’);if(i2) i2.focus();
}

function togEx(i){
const b=document.getElementById(`eb${i}`);
const ic=document.getElementById(`ei${i}`);
if(b.classList.contains(‘open’)){b.classList.remove(‘open’);ic.textContent=‘▼’;}
else{b.classList.add(‘open’);ic.textContent=‘▲’;}
}

function goW(id){cW=id;cT=0;buildStrip();buildTabs();renderPanel();}
function goT(i){cT=i;buildTabs();renderPanel();}

buildStrip();buildTabs();renderPanel();
</script>

</body>
</html>
