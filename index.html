<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edexcel A Economics — May Sprint Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>

.wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ── TUTOR ── */

.quick-btn:hover { border-color: var(--gold); color: var(--gold2); background: rgba(200,151,58,0.06); }
.chat-area { border: 1px solid var(--border2); border-radius: 4px; overflow: hidden; background: rgba(0,0,0,0.2); }

.chat-messages::-webkit-scrollbar { width: 3px; } .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.msg { max-width: 85%; font-size: 14px; line-height: 1.6; }

.msg-ai { align-self: flex-start; background: rgba(200,151,58,0.07); border: 1px solid var(--border2); border-radius: 3px 3px 3px 0; padding: 10px 14px; color: var(--parchment); }

@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
.chat-input-row { display: flex; border-top: 1px solid var(--border2); background: rgba(255,255,255,0.02); }

.send-btn { padding: 12px 16px; background: transparent; border: none; border-left: 1px solid var(--border2); cursor: pointer; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s; }
.send-btn:hover { color: var(--gold2); background: rgba(200,151,58,0.06); } .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.quiz-card { border: 1px solid var(--border2); border-radius: 4px; padding: 18px; background: rgba(255,255,255,0.015); margin-bottom: 12px; }
.quiz-q { font-size: 15px; color: var(--parchment); margin-bottom: 12px; line-height: 1.5; }

<script>
const TABS = ['overview','formulas','examples','diagrams','analysis','quiz','tutor'];

const weeks = [
  {
    id: 0, week: "Week 1", type: "micro",
    title: "Supply & Demand Analytics",
    focus: "Price mechanism, elasticity calculations and tax incidence",
    topics: [
      { title: "Price Elasticity of Demand", body: "Measures responsiveness of Qd to a change in price. PED > 1 = elastic (luxury goods), PED < 1 = inelastic (necessities, addictive goods)." },
      { title: "Price Elasticity of Supply", body: "Responsiveness of Qs to price changes. Higher with more time (SR vs LR), spare capacity, and easily stored goods." },
      { title: "Cross & Income Elasticity", body: "XED measures demand response to another good's price (positive = substitutes, negative = complements). YED positive = normal good; negative = inferior." },
      { title: "Tax Incidence", body: "Who bears the burden of an indirect tax depends on relative elasticities. More inelastic side bears more. Drawn as a leftward shift of supply." }
    ],
    formulas: [
      { name: "PED", expr: "PED = %ΔQd / %ΔP", note: "Ignore the negative sign unless asked" },
      { name: "PES", expr: "PES = %ΔQs / %ΔP", note: "Always positive" },
      { name: "YED", expr: "YED = %ΔQd / %ΔY", note: "Negative = inferior good" },
      { name: "XED", expr: "XED = %ΔQd(A) / %ΔP(B)", note: "+ve = substitutes, –ve = complements" },
      { name: "Total Revenue Test", expr: "If PED > 1: ↑P → TR falls", note: "Elastic: P and TR move oppositely" },
      { name: "Tax burden (consumers)", expr: "Share = PES / (PED + PES)", note: "Both as absolute values" }
    ],
    examples: [
      {
        q: "When price rises from £10 to £12, quantity falls from 500 to 400 units. Calculate PED and state whether demand is elastic.",
        steps: [
          { text: "Calculate %ΔP: <code>(12−10)/10 × 100 = 20%</code>" },
          { text: "Calculate %ΔQd: <code>(400−500)/500 × 100 = −20%</code>" },
          { text: "Apply formula: <code>PED = −20% / 20% = −1</code>" },
          { text: "Absolute value = 1, so demand is <strong>unit elastic</strong>. Total revenue is unchanged." }
        ],
        answer: "PED = 1 (unit elastic). TR = £5,000 before and after."
      },
      {
        q: "A specific tax of £4 is imposed. PED = 0.5 (absolute), PES = 1.5. How much does the consumer bear?",
        steps: [
          { text: "Consumer share formula: <code>PES / (PED + PES)</code>" },
          { text: "Substitute: <code>1.5 / (0.5 + 1.5) = 0.75</code>" },
          { text: "Consumer bears <code>0.75 × £4 = £3</code> of the tax." },
          { text: "Producer bears the remaining <code>£1</code>." }
        ],
        answer: "Consumer bears £3; producer bears £1. More inelastic demand → larger consumer burden."
      }
    ],
    diagrams: [
      {
        title: "Shifting Supply for an Indirect Tax",
        steps: [
          "Draw initial supply S₁ and demand D intersecting at P₁, Q₁",
          "Shift supply LEFT to S₂ — vertical distance equals the tax per unit",
          "New equilibrium: P₂ (higher price consumers pay), Q₂ (lower quantity)",
          "Producer receives P₂ minus tax (below P₁ if inelastic supply)",
          "Tax revenue rectangle = tax × Q₂ (between two horizontal price lines)",
          "Deadweight loss = small triangle to the right of Q₂, inside the old equilibrium"

let currentWeek = 0;
let activeTab = 'overview';
let scores = {};
let chatHistory = [];

let mcqFilter = 'All';
let mcqAnswers = {};
let mcqDone = false;

function renderMCQRevision(w) {
  const bank = w.mcqBank;
  const topics = ['All', ...new Set(bank.map(q => q.topic))];
  const filtered = mcqFilter === 'All' ? bank : bank.filter(q => q.topic === mcqFilter);

  if (mcqDone) {
    // calculate results
    let total = 0, correct = 0;
    const byTopic = {};
    bank.forEach((q, i) => {
      byTopic[q.topic] = byTopic[q.topic] || { correct: 0, total: 0 };
      byTopic[q.topic].total++;
      total++;
      if (mcqAnswers[i] === q.correct) { correct++; byTopic[q.topic].correct++; }
    });
    const pct = Math.round(correct/total*100);
    const grade = pct >= 80 ? '🏆 Excellent' : pct >= 60 ? '✓ Good' : pct >= 40 ? '△ Needs work' : '✗ Keep revising';
    return `
      <div class="mcq-results">
        <div class="mcq-results-score">${correct} / ${total} — ${pct}%</div>
        <div class="mcq-results-sub">${grade} · ${total} questions across all 9 topics</div>
        <div class="mcq-breakdown">
          ${Object.entries(byTopic).map(([t, s]) => `
            <div class="mcq-breakdown-item">
              <div class="mcq-breakdown-topic">${t}</div>
              <div class="mcq-breakdown-score"><span>${s.correct}/${s.total}</span> — ${Math.round(s.correct/s.total*100)}%</div>
            </div>
          `).join('')}
        </div>
      </div>
      ${bank.map((q, i) => `
        <div class="quiz-card">
          <div class="q-topic-tag">${q.topic}</div>
          <div class="quiz-q">${i+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o, oi) => `<button class="quiz-opt ${oi === q.correct ? 'correct' : (mcqAnswers[i] === oi && oi !== q.correct ? 'wrong' : '')}" disabled>${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation show">${q.exp}</div>
        </div>
      `).join('')}
      <button onclick="resetMCQ()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;margin-top:8px;">Start Over</button>
    `;
  }

  const answeredCount = Object.keys(mcqAnswers).length;
  return `
    <div class="mcq-filter-bar">
      ${topics.map(t => `<button class="mcq-filter-btn ${mcqFilter === t ? 'active' : ''}" onclick="setMCQFilter('${t}')">${t}</button>`).join('')}
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:1rem;">
      Showing ${filtered.length} of ${bank.length} questions · ${answeredCount} answered
    </div>
    ${filtered.map((q) => {
      const globalIdx = bank.indexOf(q);
      const chosen = mcqAnswers[globalIdx];
      return `
        <div class="quiz-card">
          <div class="q-topic-tag">${q.topic}</div>
          <div class="quiz-q">${globalIdx+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o, oi) => `<button class="quiz-opt${chosen !== undefined ? (oi === q.correct ? ' correct' : (chosen === oi ? ' wrong' : '')) : ''}" onclick="mcqAnswer(${globalIdx},${oi})" ${chosen !== undefined ? 'disabled' : ''} id="mcq${globalIdx}o${oi}">${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation${chosen !== undefined ? ' show' : ''}" id="mcqexp${globalIdx}">${q.exp}</div>
        </div>
      `;
    }).join('')}
    ${mcqFilter === 'All' ? `
      <div id="mcqSubmitRow" style="margin-top:12px;${answeredCount < bank.length ? 'display:none;' : ''}">
        <button onclick="submitMCQ()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--teal2);background:rgba(45,122,111,0.1);color:var(--teal2);cursor:pointer;border-radius:3px;">See Full Results &amp; Breakdown</button>
      </div>
    ` : `<p style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">Select "All" to submit and see your results breakdown.</p>`}
  `;
}

function setMCQFilter(topic) {
  mcqFilter = topic;
  document.getElementById('tabContent').innerHTML = renderMCQRevision(weeks[currentWeek]);
  attachMCQHandlers();
}

function mcqAnswer(qi, oi) {
  if (mcqAnswers[qi] !== undefined) return;
  mcqAnswers[qi] = oi;
  const q = weeks[currentWeek].mcqBank[qi];
  q.opts.forEach((_, i) => {
    const btn = document.getElementById(`mcq${qi}o${i}`);
    if (!btn) return;
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
  });
  const exp = document.getElementById(`mcqexp${qi}`);
  if (exp) exp.classList.add('show');
  const bank = weeks[currentWeek].mcqBank;
  const answeredCount = Object.keys(mcqAnswers).length;
  const submitRow = document.getElementById('mcqSubmitRow');
  if (submitRow) {
    const countEl = submitRow.previousElementSibling;
    if (countEl) countEl.textContent = `Showing ${bank.length} of ${bank.length} questions · ${answeredCount} answered`;
    if (answeredCount >= bank.length) submitRow.style.display = 'block';
  }
}

function submitMCQ() {
  mcqDone = true;
  document.getElementById('tabContent').innerHTML = renderMCQRevision(weeks[currentWeek]);
}

function resetMCQ() {
  mcqAnswers = {};
  mcqDone = false;
  mcqFilter = 'All';
  document.getElementById('tabContent').innerHTML = renderMCQRevision(weeks[currentWeek]);
  attachMCQHandlers();
}

function attachMCQHandlers() { /* no extra handlers needed — all inline */ }

function buildNav() {
  const nav = document.getElementById('navItems');
  nav.innerHTML = weeks.map(w => `
    <div class="nav-item ${w.id === currentWeek ? 'active' : ''}" onclick="selectWeek(${w.id})">
      <div class="nav-dot dot-${w.type}"></div>
      <div class="nav-content">
        <div class="nav-week">${w.week}</div>
        <div class="nav-title">${w.title}</div>
      </div>
    </div>
  `).join('');
}

function selectWeek(id) {
  currentWeek = id;
  activeTab = weeks[id].isMCQ ? 'mcq' : 'overview';
  buildNav();
  renderContent();
  document.querySelector('.content').scrollTop = 0;
}

function renderContent() {
  const w = weeks[currentWeek];
  const score = scores[currentWeek] || { correct: 0, total: 0, done: false };
  const content = document.getElementById('mainContent');
  content.style.animation = 'none';
  setTimeout(() => { content.style.animation = 'fadeUp 0.25s ease'; }, 10);

  const typeLabel = w.type === 'micro' ? 'Microeconomics' : w.type === 'macro' ? 'Macroeconomics' : w.type === 'revision' ? 'Revision · Mixed' : 'Synoptic · P3';

  if (w.isMCQ) {
    content.innerHTML = `
      <div class="week-header">
        <div class="week-meta">
          <span class="week-tag tag-revision">Revision · Mixed</span>
          <span class="week-number muted">${w.week}</span>
        </div>
        <div class="week-title-text">${w.title}</div>
        <div class="week-focus">${w.focus}</div>
      </div>
      <div id="tabContent">${renderMCQRevision(w)}</div>
    `;
    attachMCQHandlers();
    return;
  }

  content.innerHTML = `
    <div class="week-header">
      <div class="week-meta">
        <span class="week-tag tag-${w.type}">${typeLabel}</span>
        <span class="week-number muted">${w.week} of ${weeks.length - 1}</span>
      </div>
      <div class="week-title-text">${w.title}</div>
      <div class="week-focus">${w.focus}</div>
      <div class="progress-bar mt"><div class="progress-fill" style="width:${((w.id+1)/(weeks.length-1))*100}%"></div></div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='overview'?'active':''}" onclick="switchTab('overview')">Overview</div>
      <div class="tab ${activeTab==='formulas'?'active':''}" onclick="switchTab('formulas')">Formulae</div>
      <div class="tab ${activeTab==='examples'?'active':''}" onclick="switchTab('examples')">Worked Examples</div>
      <div class="tab ${activeTab==='diagrams'?'active':''}" onclick="switchTab('diagrams')">Diagrams</div>
      <div class="tab ${activeTab==='analysis'?'active':''}" onclick="switchTab('analysis')">Analysis</div>
      <div class="tab ${activeTab==='quiz'?'active':''}" onclick="switchTab('quiz')">Quiz${score.done ? ' ✓' : ''}</div>
      <div class="tab ${activeTab==='tutor'?'active':''}" onclick="switchTab('tutor')">AI Tutor</div>
    </div>
    <div id="tabContent">${renderTab(w, score)}</div>
  `;
  attachHandlers();
}

function renderTab(w, score) {
  switch(activeTab) {
    case 'overview':  return renderOverview(w);
    case 'formulas':  return renderFormulas(w);
    case 'examples':  return renderExamples(w);
    case 'diagrams':  return renderDiagrams(w);
    case 'analysis':  return renderAnalysis(w);
    case 'quiz':      return renderQuiz(w, score);
    case 'tutor':     return renderTutor(w);
    default: return '';
  }
}

function switchTab(tab) {
  activeTab = tab;
  const w = weeks[currentWeek];
  const score = scores[currentWeek] || { correct: 0, total: 0, done: false };
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const idx = TABS.indexOf(tab);
  if (idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tabContent').innerHTML = renderTab(w, score);
  attachHandlers();
}

        ${w.quickPrompts.map(p => `<button class="quick-btn" onclick="askTutor('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
      </div>
      <p style="font-size:13px;color:var(--muted)">Click any prompt or switch to the <strong style="color:var(--gold2)">AI Tutor</strong> tab for a full conversation.</p>
    </div>
  `;
}

function renderFormulas(w) {
  return `
    <div class="formula-section">
      <div class="section-heading">Key Formulae — ${w.title}</div>
      <div class="formula-grid">
        ${w.formulas.map(f => `
          <div class="formula-card">
            <div class="formula-name">${f.name}</div>
            <div class="formula-expr">${f.expr}</div>
            <div class="formula-note">${f.note}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">
      Tip: In Paper 3 data questions, always write the formula first, then substitute — you gain method marks even if the final answer is wrong.
    </div>
  `;
}

function renderExamples(w) {
  return w.examples.map((ex, i) => `
    <div class="example-box">
      <div class="example-header" onclick="toggleExample(${i})">
        <div>
          <div class="example-label">Worked Example ${i+1}</div>
          <div class="example-q">${ex.q}</div>
        </div>
        <div class="toggle-icon" id="icon-${i}">▼</div>
      </div>
      <div class="example-body" id="ex-${i}">
        ${ex.steps.map((s, si) => `
          <div class="step">
            <div class="step-num">${si+1}</div>
            <div class="step-content">${s.text}</div>
          </div>
        `).join('')}
        <div class="answer-box">✓ Answer: ${ex.answer}</div>
      </div>
    </div>
  `).join('') + `<p style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">Click each example to expand. Practice writing these out before checking.</p>`;
}

function renderDiagrams(w) {
  return w.diagrams.map(d => `
    <div class="diagram-guide">
      <div class="diagram-title">${d.title}</div>
      <ol class="diagram-steps">
        ${d.steps.map(s => `<li>${s}</li>`).join('')}
      </ol>
    </div>
  `).join('') + `
    <div class="diagram-guide" style="border-color:rgba(200,151,58,0.2);background:rgba(200,151,58,0.03);">
      <div class="diagram-title" style="color:var(--gold)">Edexcel Diagram Rules</div>
      <ol class="diagram-steps">
        <li>Always label BOTH axes (Price/Cost on Y-axis, Quantity/Output on X-axis)</li>
        <li>Label ALL curves (D, S, MC, AC, MR, AR, AD, AS, LRAS)</li>
        <li>Mark equilibrium point(s) clearly — use dotted lines to both axes</li>
        <li>Shade any area asked for (profit, welfare loss, consumer surplus)</li>
        <li>Show direction of shift with arrows on the curve itself</li>
        <li>State what the diagram shows in your written answer — don't just draw</li>
      </ol>
    </div>
  `;
}

function renderAnalysis(w) {
  if (!w.analysis || w.analysis.length === 0) return '<p style="color:var(--muted);font-size:14px;font-style:italic;padding:1rem 0;">Analysis content coming soon.</p>';
  return `
    <div style="font-size:13px;color:var(--muted);margin-bottom:1.2rem;">
      Each card shows the <strong style="color:var(--gold2)">reasoning chain</strong> to use in essays, followed by evaluation points and a common mistake to avoid.
    </div>
    ${w.analysis.map(a => `
      <div class="analysis-card">
        <div class="analysis-heading">${a.heading}</div>
        <div class="eval-label">Reasoning Chain</div>
        <div class="analysis-chain">${a.chain}</div>
        <div class="eval-label">Evaluation Points</div>
        <div class="eval-list">
          ${a.evals.map(e => `<div class="eval-item">${e}</div>`).join('')}
        </div>
        <div class="mistake-box">
          <div class="mistake-label">⚠ Common Mistake</div>
          <div class="mistake-text">${a.mistake}</div>
        </div>
      </div>
    `).join('')}
    <div style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">
      Use the <strong style="color:var(--gold2)">AI Tutor</strong> tab to get a personalised evaluation paragraph on any of these points.
    </div>
  `;
}

function renderQuiz(w, score) {
  if (score.done) {
    return `
      <div class="quiz-score">Score: ${score.correct} / ${w.quiz.length} — ${Math.round(score.correct/w.quiz.length*100)}%</div>
      ${w.quiz.map((q, i) => `
        <div class="quiz-card">
          <div class="quiz-q">${i+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o, oi) => `<button class="quiz-opt ${oi === q.correct ? 'correct' : (score.answers && score.answers[i] === oi && oi !== q.correct ? 'wrong' : '')}" disabled>${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation show">${q.exp}</div>
        </div>
      `).join('')}
      <button onclick="resetQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;margin-top:8px;">Retry Quiz</button>
    `;
  }
  return `
    <div class="quiz-score" id="quizScore">Question 1 of ${w.quiz.length}</div>
    ${w.quiz.map((q, i) => `
      <div class="quiz-card">
        <div class="quiz-q">${i+1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="answerQuiz(${i}, ${oi})" id="q${i}o${oi}">${o}</button>`).join('')}
        </div>
        <div class="quiz-explanation" id="exp${i}">${q.exp}</div>
      </div>
    `).join('')}
    <div id="submitRow" style="margin-top:12px;display:none;">
      <button onclick="submitQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--teal2);background:rgba(45,122,111,0.1);color:var(--teal2);cursor:pointer;border-radius:3px;">Submit Answers</button>
    </div>
  `;
}

let quizAnswers = {};
function answerQuiz(qi, oi) {
  quizAnswers[qi] = oi;
  const w = weeks[currentWeek];
  w.quiz[qi].opts.forEach((_, i) => {
    const btn = document.getElementById(`q${qi}o${i}`);
    if (btn) btn.style.borderColor = i === oi ? 'var(--gold2)' : '';
  });
  const answered = Object.keys(quizAnswers).length;
  document.getElementById('quizScore').textContent = `${answered} of ${w.quiz.length} answered`;
  if (answered === w.quiz.length) document.getElementById('submitRow').style.display = 'block';
}

function submitQuiz() {
  const w = weeks[currentWeek];
  let correct = 0;
  w.quiz.forEach((q, i) => {
    const chosen = quizAnswers[i];
    q.opts.forEach((_, oi) => {
      const btn = document.getElementById(`q${i}o${oi}`);
      if (!btn) return;
      btn.disabled = true;
      if (oi === q.correct) btn.classList.add('correct');
      else if (chosen === oi) btn.classList.add('wrong');
    });
    if (chosen === q.correct) correct++;
    const exp = document.getElementById(`exp${i}`);
    if (exp) exp.classList.add('show');
  });
  scores[currentWeek] = { correct, total: w.quiz.length, done: true, answers: {...quizAnswers} };
  quizAnswers = {};
  document.getElementById('quizScore').textContent = `Score: ${correct} / ${w.quiz.length} — ${Math.round(correct/w.quiz.length*100)}%`;
  document.getElementById('submitRow').innerHTML = `<button onclick="resetQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;">Retry Quiz</button>`;
}

function resetQuiz() {
  scores[currentWeek] = { correct: 0, total: 0, done: false };
  quizAnswers = {};
  switchTab('quiz');
}

function renderTutor(w) {
  const msgs = (chatHistory[currentWeek] || []);
  return `
    <div class="tutor-section" style="padding-top:0;border-top:none;margin-top:0;">
      <div class="tutor-heading">AI Economics Tutor</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Ask anything about ${w.title}. Explain concepts, check working, get essay tips or diagram walkthroughs.</p>
      <div class="quick-prompts">
        ${w.quickPrompts.map(p => `<button class="quick-btn" onclick="sendFromBtn('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
      </div>
      <div class="chat-area">
        <div class="chat-messages" id="chatMsgs">
          ${msgs.length === 0 ? `<div style="color:var(--muted);font-size:13px;text-align:center;margin:auto;padding:2rem;font-style:italic;">Ask a question about ${w.title} to begin…</div>` : msgs.map(m => `<div class="msg msg-${m.role}"><div class="msg-label">${m.role === 'user' ? 'You' : 'Tutor'}</div>${m.content}</div>`).join('')}
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask about ${w.title}…" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  `;
}

function attachHandlers() {
  const ta = document.getElementById('chatInput');
  if (ta) ta.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function toggleExample(i) {
  const body = document.getElementById(`ex-${i}`);
  const icon = document.getElementById(`icon-${i}`);
  if (body.classList.contains('open')) { body.classList.remove('open'); icon.textContent = '▼'; }
  else { body.classList.add('open'); icon.textContent = '▲'; }
}

function sendFromBtn(text) {
  if (activeTab !== 'tutor') { activeTab = 'tutor'; switchTab('tutor'); }
  setTimeout(() => { const inp = document.getElementById('chatInput'); if (inp) { inp.value = text; sendMessage(); } }, 100);
}

function askTutor(text) {
  activeTab = 'tutor'; switchTab('tutor');
  setTimeout(() => { const inp = document.getElementById('chatInput'); if (inp) { inp.value = text; sendMessage(); } }, 100);
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const msgs = document.getElementById('chatMsgs');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = ''; input.style.height = 'auto';
  if (sendBtn) sendBtn.disabled = true;
  if (!chatHistory[currentWeek]) chatHistory[currentWeek] = [];
  chatHistory[currentWeek].push({ role: 'user', content: text });
  msgs.innerHTML = chatHistory[currentWeek].map(m => `<div class="msg msg-${m.role}"><div class="msg-label">${m.role === 'user' ? 'You' : 'Tutor'}</div>${m.content}</div>`).join('');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg msg-ai';
  typingDiv.innerHTML = `<div class="msg-label">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(typingDiv);
  msgs.scrollTop = msgs.scrollHeight;
  const w = weeks[currentWeek];
  const systemPrompt = `You are an expert Edexcel A Level Economics tutor. The student is currently studying: "${w.title}" (${w.week}). Focus: ${w.focus}.
Key concepts: ${w.topics.map(t=>t.title).join(', ')}.
Key formulae: ${w.formulas.map(f=>f.expr).join(' | ')}.
Your role: clear exam-focused explanations, step-by-step calculations, diagram guidance, essay technique tips, Edexcel mark scheme language. Be concise but thorough. Use • bullet points for lists.`;
  const messages = chatHistory[currentWeek].map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content.replace(/<[^>]*>/g, '') }));
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt, messages })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, I could not get a response. Please try again.';
    const formatted = reply
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code style="font-family:\'DM Mono\',monospace;background:rgba(61,168,152,0.12);color:var(--teal2);padding:1px 5px;border-radius:2px;font-size:13px;">$1</code>')
      .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    chatHistory[currentWeek].push({ role: 'ai', content: formatted });
    typingDiv.remove();
    msgs.innerHTML = chatHistory[currentWeek].map(m => `<div class="msg msg-${m.role}"><div class="msg-label">${m.role === 'user' ? 'You' : 'Tutor'}</div>${m.content}</div>`).join('');
  } catch(e) {
    typingDiv.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg msg-ai';
    errDiv.innerHTML = `<div class="msg-label">Tutor</div>Network error — please check your connection and retry.`;
    msgs.appendChild(errDiv);
  }
  if (sendBtn) sendBtn.disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}

buildNav();
renderContent();
</script>
</body>
</html>
